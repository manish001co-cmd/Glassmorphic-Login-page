<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="wrapper">

        <form class="container">

            <h1>Reset Password</h1>

            <div class="item">
                <input type="email" name="email" id="email" placeholder="E-mail" autocomplete="username" aria-label="Email Address" required>

                <i class="bi bi-envelope"></i>
            </div>

            <div class="item">
                <input type="text" name="otp" id="otp" placeholder="OTP" autocomplete="one-time-code" aria-label="One-Time Password" required>

                <i class="bi bi-chat-left-text"></i>
            </div>

            <div class="item">
                <input type="password" name="password" id="password" placeholder="New Password" autocomplete="new-password" aria-label="New Password" required>

                <i class="bi bi-eye-slash toggle-password" id="togglePassword" style="cursor: pointer;"></i>
            </div>

            <div class="item">
                <input type="password" name="confirm-password" id="confirm-password" placeholder="Confirm Password" autocomplete="new-password" aria-label="Confirm New Password" required>

                <i class="bi bi-eye-slash toggle-password" id="toggleConfirmPassword" style="cursor: pointer;"></i>
            </div>

            <button type="submit">
                Create New Password
            </button>

            <div class="register">
                <p>
                    Remember your password ?
                    <a href="index.html">Login</a>
                </p>
            </div>

        </form>

    </div>

    <script>
        // Password Visibility Toggle
        function setupToggle(toggleId, inputId) {
            const toggle = document.querySelector(toggleId);
            const input = document.querySelector(inputId);
            if (toggle && input) {
                toggle.addEventListener('click', function () {
                    const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
                    input.setAttribute('type', type);
                    this.classList.toggle('bi-eye');
                    this.classList.toggle('bi-eye-slash');
                });
            }
        }
        setupToggle('#togglePassword', '#password');
        setupToggle('#toggleConfirmPassword', '#confirm-password');

        // Form Validation
        document.querySelector('form').addEventListener('submit', function (e) {
            const passwordVal = document.querySelector('#password').value;
            const confirmPasswordVal = document.querySelector('#confirm-password').value;

            if (passwordVal !== confirmPasswordVal) {
                e.preventDefault();
                alert('Passwords do not match! Please check and try again.');
            } else {
                e.preventDefault();
                alert('Password reset successful! (Demo)');
            }
        });
    </script>

</body>

</html>
