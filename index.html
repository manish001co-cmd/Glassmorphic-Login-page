<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Login Form</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="wrapper">

        <form class="container">

            <h1>Login</h1>

            <div class="item">
                <input type="email" placeholder="E-mail" autocomplete="username" required>

                <i class="bi bi-envelope"></i>
            </div>

            <div class="item">
                <input type="password" name="password" id="password" placeholder="Password" autocomplete="new-password" aria-label="Create a new Password" required>

                <i class="bi bi-eye-slash toggle-password" id="togglePassword" style="cursor: pointer;"></i>
            </div>

            <div class="item-remember">
                <div>
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <a href="forget-pass.html">Forgot Password ?</a>
            </div>

            <button type="submit">
                Login
            </button>

            <div class="register">
                <p>
                    Don't have an account?
                    <a href="registration.html">Register</a>
                </p>
            </div>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
