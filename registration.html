<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create an Account</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="wrapper">

        <form class="container">

            <h1>Create an Account</h1>

            <div class="item">
                <input type="text" name="name" id="name" placeholder="Name" autocomplete="name" aria-label="Full Name" required>

                <i class="bi bi-person"></i>
            </div>


            <div class="item">
                <input type="email" name="email" id="email" placeholder="E-mail" autocomplete="username" aria-label="Email Address" required>

                <i class="bi bi-envelope"></i>
            </div>


            <div class="item">
                <input type="password" name="password" id="password" placeholder="Create a new Password" autocomplete="new-password" aria-label="Create a new Password" required>

                <i class="bi bi-eye-slash toggle-password" id="togglePassword" style="cursor: pointer;"></i>
            </div>

            <div class="item">
                <input type="password" name="confirm-password" id="confirm-password" placeholder="Confirm your Password" autocomplete="new-password" aria-label="Confirm your Password" required>

                <i class="bi bi-eye-slash toggle-password" id="toggleConfirmPassword" style="cursor: pointer;"></i>
            </div>

            <button type="submit">
                Sign Up
            </button>

            <div class="register">
                <p>
                    Already have an account?
                    <a href="index.html">Login</a>
                </p>
            </div>

        </form>

    </div>

    <script src="script.js"></script>

</body>

</html>
